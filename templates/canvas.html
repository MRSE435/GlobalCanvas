{% extends "layout.html" %}
{% block content %}
<h2>Your Canvas</h2>
<form method="post" class="card p-4 shadow-sm">
  <div class="mb-3">
    <textarea class="form-control" name="content" rows="6">{{ content }}</textarea>
  </div>
  <button class="btn btn-primary">Save</button>
  <a href="{{ url_for('logout') }}" class="btn btn-secondary">Logout</a>
</form>
{% endblock %}
